<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>排排看小遊戲</title>
  <style>
    :root{
      --bg:#f3f4fa;
      --text:#111827;
      --muted:#6b7280;
      --easy:#22c55e;
      --mid:#eab308;
      --hard:#f97316;
      --line:rgba(15,23,42,.12);
      --shadow:0 18px 45px rgba(15,23,42,.08);
      --radius:18px;

      --ui-scale:1;
      --pad-body:14px;

      --gamewrap-h:640px;
      --gamewrap-vh:70vh;

      --gameMain-pad:12px;
      --gameMain-gap:12px;

      --panel-pad:12px;
      --panel-gap:10px;

      --slots-gap:12px;
      --slot-h:104px;
      --slot-pad:6px;

      --submit-h:64px;
      --result-bottom-gap:22px;

      --home-title-top:46px;
      --home-title-bottom:42px;
      --home-diff-bottom:46px;
      --home-bottom-pad:12px;

      /* 說明視窗整體縮小，避免遮住標題與按鈕 */
      --help-modal-w:1120px;
      --help-body-maxh:72vh;
      --help-pane-minh:380px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(900px 700px at 20% 10%, #ffffff 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:calc(var(--pad-body) * var(--ui-scale));
      overflow:hidden;
    }
    .app{
      width:min(980px,100%);
      border:1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f9fafb);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .screen{display:none; padding:18px 16px 18px;}
    .screen.active{display:block;}

    /* HOME */
    .title{
      font-size:58px; font-weight:950; letter-spacing:1px;
      text-align:center;
      margin:calc(var(--home-title-top) * var(--ui-scale)) 0 calc(var(--home-title-bottom) * var(--ui-scale));
      color:#0f172a;
    }
    .difficultyRow{
      display:flex; justify-content:center; gap:14px; flex-wrap:wrap;
      margin:0 0 calc(var(--home-diff-bottom) * var(--ui-scale));
    }
    .diffBtn{
      min-width:190px;
      padding:15px 16px;
      border-radius:16px;
      background:#ffffff;
      color:#0f172a;
      border:3px solid transparent;
      cursor:pointer;
      font-weight:950;
      transition:.15s;
      font-size:18px;
      letter-spacing:.6px;
      box-shadow:0 6px 16px rgba(148,163,184,.18);
    }
    .diffBtn[data-diff="easy"]{border-color:var(--easy);}
    .diffBtn[data-diff="mid"]{border-color:var(--mid);}
    .diffBtn[data-diff="hard"]{border-color:var(--hard);}
    .diffBtn:hover{transform:translateY(-1px); box-shadow:0 10px 22px rgba(148,163,184,.24);}
    .diffBtn.selected{
      box-shadow:0 0 0 4px rgba(37,99,235,.16);
      transform:translateY(-1px);
    }
    .homeActions{
      display:flex; flex-direction:column; align-items:center;
      gap:10px;
      margin-bottom:calc(var(--home-bottom-pad) * var(--ui-scale));
    }
    .primaryBtn{
      width:min(520px,94%);
      padding:16px 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#111827;
      color:#f9fafb;
      font-weight:950;
      letter-spacing:.8px;
      cursor:pointer;
      transition:.15s;
      font-size:18px;
      box-shadow:0 10px 25px rgba(15,23,42,.22);
    }
    .primaryBtn:disabled{
      opacity:.40;
      cursor:not-allowed;
      box-shadow:none;
      background:#9ca3af;
    }
    .primaryBtn:not(:disabled):hover{
      transform:translateY(-1px);
      background:#020617;
    }
    .secondaryBtn{
      width:min(520px,94%);
      padding:14px 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#ffffff;
      color:var(--text);
      cursor:pointer;
      font-size:16px;
      font-weight:850;
      box-shadow:0 4px 10px rgba(148,163,184,.18);
    }
    .secondaryBtn:hover{background:#f3f4ff;}

    /* GAME TOP */
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#f3f4ff;
    }
    .reqBox{
      flex:1;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#ffffff;
      min-height:56px;
      box-shadow:0 4px 10px rgba(148,163,184,.18);
    }
    .reqLeft{display:flex; flex-direction:column; gap:6px; min-width:0;}
    .reqText{
      font-size:22px; letter-spacing:.4px; font-weight:950;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color:#0f172a;
    }
    .reqMeta{
      font-size:14px; color:var(--muted);
      display:flex; gap:10px; flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--line);
      background:#eef2ff;
      padding:4px 10px;
      border-radius:999px;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      font-weight:900;
    }
    .timer{
      font-variant-numeric:tabular-nums;
      font-weight:950;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#111827;
      color:#f9fafb;
      min-width:108px;
      text-align:center;
      font-size:16px;
      box-shadow:0 6px 18px rgba(15,23,42,.28);
    }
    .topActions{display:flex; gap:10px; align-items:center;}
    .iconBtn{
      border:1px solid var(--line);
      background:#ffffff;
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      transition:.15s;
      white-space:nowrap;
      font-weight:900;
      font-size:15px;
      box-shadow:0 4px 12px rgba(148,163,184,.18);
    }
    .iconBtn:hover{
      transform:translateY(-1px);
      background:#e5edff;
    }

    /* GAME LAYOUT */
    .gameWrap{
      display:flex; flex-direction:column;
      height:min(calc(var(--gamewrap-h) * var(--ui-scale)), calc(var(--gamewrap-vh) * var(--ui-scale)));
    }
    .gameMain{
      flex:1;
      display:flex; flex-direction:column;
      gap:calc(var(--gameMain-gap) * var(--ui-scale));
      padding:calc(var(--gameMain-pad) * var(--ui-scale));
      min-height:0;
    }
    .upper,.lower{
      flex:1 1 50%;
      border-radius:var(--radius);
      border:1px solid var(--line);
      padding:calc(var(--panel-pad) * var(--ui-scale));
      display:flex; flex-direction:column;
      gap:calc(var(--panel-gap) * var(--ui-scale));
      min-height:0;
    }
    .upper{background:#f9fafb;}
    .lower{background:#f3f4ff;}

    .panelHeader{display:grid; grid-template-columns:1fr auto 1fr; align-items:center;}
    .panelTitle{
      text-align:center;
      font-weight:950;
      color:var(--muted);
      letter-spacing:.7px;
      font-size:16px;
    }
    .slots{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:calc(var(--slots-gap) * var(--ui-scale));
      width:min(640px,100%);
      margin:0 auto;
      flex:0 0 auto;
    }
    .slot{
      height:calc(var(--slot-h) * var(--ui-scale));
      padding:calc(var(--slot-pad) * var(--ui-scale));
      border-radius:18px;
      border:2px dashed rgba(148,163,184,.55);
      background:#e5edff;
      display:flex; align-items:center; justify-content:center;
      transition:.12s;
    }
    .slot.over{
      outline:3px solid rgba(59,130,246,.55);
      outline-offset:2px;
      background:#dbeafe;
    }
    .slot.selectedTarget{
      outline:3px solid rgba(59,130,246,.65);
      outline-offset:2px;
      background:#dbeafe;
    }
    .card{
      width:100%; height:100%;
      border-radius:18px;
      border:1px solid rgba(148,163,184,.80);
      background:linear-gradient(180deg,#ffffff,#e5edff);
      display:flex; align-items:center; justify-content:center;
      font-size:calc(52px * var(--ui-scale));
      font-weight:980;
      letter-spacing:1px;
      cursor:grab;
      user-select:none;
      box-shadow:0 14px 28px rgba(15,23,42,.20);
      transition:.12s;
      color:#0f172a;
    }
    .card.selected{
      outline:4px solid rgba(59,130,246,.65);
      outline-offset:2px;
      transform:translateY(-1px);
      background:linear-gradient(180deg,#ffffff,#dbeafe);
    }

    .submitArea{
      height:calc(var(--submit-h) * var(--ui-scale));
      display:flex; justify-content:center; align-items:center;
      flex:0 0 calc(var(--submit-h) * var(--ui-scale));
    }
    .submitBtn{
      width:min(640px,100%);
      padding:14px 16px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#111827;
      color:#f9fafb;
      font-weight:950;
      letter-spacing:.8px;
      cursor:pointer;
      transition:.15s;
      font-size:18px;
      box-shadow:0 10px 24px rgba(15,23,42,.30);
    }
    .submitBtn:hover{
      transform:translateY(-1px);
      background:#020617;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      background:#111827;
      border:1px solid rgba(15,23,42,.4);
      border-radius:14px;
      padding:10px 12px;
      box-shadow:0 16px 40px rgba(15,23,42,.45);
      color:#f9fafb;
      display:none;
      max-width:min(720px,92vw);
      font-size:14px;
      z-index:50;
    }
    .toast.show{display:block;}

    /* MODAL */
    .modalBackdrop{
      position:fixed; inset:0;
      background:rgba(15,23,42,.25);
      display:none;
      align-items:center; justify-content:center;
      padding:10px;
      z-index:40;
    }
    .modalBackdrop.show{display:flex;}
    .modal{
      width:min(var(--help-modal-w),98vw);
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:#ffffff;
      box-shadow:0 24px 60px rgba(15,23,42,.20);
      overflow:hidden;
    }
    .modalHeader{
      padding:14px 14px;
      border-bottom:1px solid var(--line);
      display:flex; justify-content:space-between; align-items:center;
      gap:10px;
      background:#f3f4ff;
    }
    .modalHeader h3{
      margin:0;
      font-size:22px;
      letter-spacing:.4px;
      font-weight:950;
      color:#0f172a;
    }
    .modalClose{display:none;}
    .modalBody{
      padding:12px 12px 10px;
      color:var(--text);
      line-height:1.7;
      font-size:17px;
      max-height:var(--help-body-maxh);
      overflow:auto;
      background:#ffffff;
    }
    .modalActions{
      padding:12px 14px 14px;
      display:flex; gap:10px;
      justify-content:flex-end;
      border-top:1px solid var(--line);
      background:#f9fafb;
      flex-wrap:wrap;
      align-items:center;
    }
    .miniBtn{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#ffffff;
      color:var(--text);
      cursor:pointer;
      font-size:15px;
      font-weight:900;
      box-shadow:0 4px 12px rgba(148,163,184,.18);
    }
    .miniBtn.primary{
      background:#111827;
      color:#f9fafb;
      font-weight:950;
      letter-spacing:.4px;
      box-shadow:0 8px 20px rgba(15,23,42,.35);
    }
    .miniBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:14px;
      background:#ffffff;
    }
    th,td{
      padding:10px 10px;
      border-bottom:1px solid rgba(148,163,184,.18);
      text-align:left;
      vertical-align:top;
    }
    th{
      background:#f3f4ff;
      color:var(--muted);
      font-weight:950;
    }
    tr:last-child td{border-bottom:none;}
    .tag{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.60);
      background:#eef2ff;
      font-size:12px;
      font-weight:950;
      letter-spacing:.3px;
      white-space:nowrap;
      color:#111827;
    }
    .tag.easy{border-color:rgba(34,197,94,.75); background:#dcfce7;}
    .tag.mid{border-color:rgba(234,179,8,.75); background:#fef9c3;}
    .tag.hard{border-color:rgba(249,115,22,.75); background:#ffedd5;}

    .resultBlock{margin-top:12px; padding-top:10px; border-top:1px solid rgba(148,163,184,.25);}
    .resultLabel{
      font-size:15px;
      color:var(--muted);
      font-weight:950;
      margin-bottom:8px;
      letter-spacing:.4px;
    }
    .cardRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .miniCard{
      width:64px; height:76px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.80);
      background:linear-gradient(180deg,#ffffff,#e5edff);
      display:flex; align-items:center; justify-content:center;
      font-size:34px; font-weight:950;
      box-shadow:0 10px 22px rgba(15,23,42,.20);
      color:#0f172a;
    }

    /* countdown overlay */
    .countdownOverlay{
      position:fixed; inset:0;
      display:none; align-items:center; justify-content:center;
      background:rgba(15,23,42,.25);
      z-index:60;
    }
    .countdownOverlay.show{display:flex;}
    .countdownBox{
      width:min(520px,92vw);
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:#ffffff;
      box-shadow:0 24px 60px rgba(15,23,42,.25);
      padding:24px 18px;
      text-align:center;
    }
    .countdownTitle{
      font-size:18px;
      color:var(--muted);
      font-weight:950;
      letter-spacing:.6px;
    }
    .countdownNum{
      font-size:72px;
      font-weight:980;
      letter-spacing:2px;
      margin-top:10px;
      font-variant-numeric:tabular-nums;
      color:#0f172a;
    }

    /* HELP layout */
    .helpGrid{
      display:grid;
      grid-template-columns:.92fr 1.08fr;
      gap:14px;
      align-items:stretch;
    }
    @media (max-width:980px){
      .helpGrid{grid-template-columns:1fr;}
    }
    .helpPane{
      border:1px solid var(--line);
      background:#f9fafb;
      border-radius:14px;
      padding:14px;
      min-height:var(--help-pane-minh);
      display:flex;
      flex-direction:column;
      justify-content:flex-start; /* 文字從上方開始排，視覺滿版 */
      overflow:hidden;
    }
    .helpPaneScroll{
      overflow:auto;
      padding-right:4px;
      max-height:var(--help-pane-minh);
    }
    .helpCard{
      border:1px solid rgba(148,163,184,.4);
      background:#ffffff;
      border-radius:14px;
      padding:12px 12px;
      margin:10px 0;
      box-shadow:0 4px 10px rgba(148,163,184,.18);
    }
    .helpTitle{
      font-weight:950;
      letter-spacing:.4px;
      margin:0 0 6px;
      font-size:19px;
      color:#0f172a;
    }
    .helpText{
      color:rgba(15,23,42,.88);
      margin:0;
      font-size:17px;
      line-height:1.75;
    }
    .noteLine{
      display:flex; gap:10px; align-items:flex-start;
      margin:8px 0;
    }
    .noteNum{
      display:inline-flex; align-items:center; justify-content:center;
      width:26px; height:26px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.8);
      background:#e5edff;
      font-weight:950;
      font-size:13px;
      flex:0 0 auto;
      margin-top:2px;
      box-shadow:0 6px 16px rgba(148,163,184,.4);
      color:#0f172a;
    }
    .kbd{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.7);
      background:#e5edff;
      font-variant-numeric:tabular-nums;
      font-size:13px;
      font-weight:900;
      margin:0 2px;
      color:#111827;
      white-space:nowrap;
    }
    .mockTitle{
      font-size:14px;
      color:rgba(55,65,81,.90);
      font-weight:900;
      letter-spacing:.4px;
      margin:0 0 10px;
    }
    .svgWrap{
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(148,163,184,.5);
      background:#e5edff;
      flex:1;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }
    .svgWrap svg{width:100%; height:100%; display:block;}
  </style>
</head>

<body>
  <div class="app">
    <!-- HOME -->
    <div id="home" class="screen active">
      <div class="title">排排看小遊戲</div>

      <div class="difficultyRow">
        <button class="diffBtn" data-diff="easy">簡單</button>
        <button class="diffBtn" data-diff="mid">中等</button>
        <button class="diffBtn" data-diff="hard">困難</button>
      </div>

      <div class="homeActions">
        <button id="startGameBtn" class="primaryBtn" disabled>開始遊戲</button>
        <button id="helpBtnHome" class="secondaryBtn">遊戲說明</button>
        <button id="recordsBtnHome" class="secondaryBtn">遊戲紀錄</button>
      </div>
    </div>

    <!-- GAME -->
    <div id="game" class="screen">
      <div class="topbar">
        <div class="reqBox">
          <div class="reqLeft">
            <div class="reqText" id="reqText">—</div>
            <div class="reqMeta">
              <span class="pill" id="roundPill">第 1 回合 / 共 3 回合</span>
              <span class="pill" id="correctPill">已答對 0 題</span>
              <span class="pill" id="diffPill">難度：—</span>
            </div>
          </div>
          <div class="timer" id="timer">—秒</div>
        </div>

        <div class="topActions">
          <button id="recordsBtnGame" class="iconBtn">遊戲紀錄</button>
          <button id="helpBtnGame" class="iconBtn">遊戲說明</button>
          <button id="leaveBtnGame" class="iconBtn">離開遊戲</button>
        </div>
      </div>

      <div class="gameWrap">
        <div class="gameMain">
          <div class="upper">
            <div class="panelHeader"><div></div><div class="panelTitle">作答欄</div><div></div></div>
            <div class="slots" id="answerSlots"></div>
          </div>

          <div class="lower">
            <div class="panelHeader"><div></div><div class="panelTitle">本回合使用的數字牌</div><div></div></div>
            <div class="slots" id="deckSlots"></div>
            <div class="submitArea" id="submitArea">
              <button id="submitBtn" class="submitBtn">送出答案</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modalBackdrop" class="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <h3 id="modalTitle">提示</h3>
        <button id="modalClose" class="modalClose">關閉</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
      <div class="modalActions" id="modalActions"></div>
    </div>
  </div>

  <!-- 3-second countdown overlay -->
  <div id="countdownOverlay" class="countdownOverlay" aria-hidden="true">
    <div class="countdownBox">
      <div class="countdownTitle">遊戲即將開始</div>
      <div class="countdownNum" id="countdownNum">3</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  const DIFF = {
    easy:{name:"簡單",limits:[150,120,90]},
    mid:{name:"中等",limits:[90,60,30]},
    hard:{name:"困難",limits:[20,20,20]}
  };

  let selectedDiff = null;

  let gameState = {
    inGame:false,
    diffKey:null,
    roundIndex:0,
    roundGoal:null,
    digits:[],
    limitSec:0,
    startTs:0,
    timerId:null,
    remainingMs:0,
    perRoundTimes:[],
    lastAnswerDigits:null   // 新增：記錄玩家這回合實際排出的數字順序
  };

  let selectedCardEl = null;
  let modalLocked = false;
  let skipRecordThisGame = false;
  let timeoutEndState = null;

  let helpPage = 0;

  const homeEl = document.getElementById("home");
  const gameEl = document.getElementById("game");

  const diffBtns = [...document.querySelectorAll(".diffBtn")];
  const startGameBtn = document.getElementById("startGameBtn");
  const helpBtnHome = document.getElementById("helpBtnHome");
  const helpBtnGame = document.getElementById("helpBtnGame");
  const recordsBtnHome = document.getElementById("recordsBtnHome");
  const recordsBtnGame = document.getElementById("recordsBtnGame");
  const leaveBtnGame = document.getElementById("leaveBtnGame");

  const reqTextEl = document.getElementById("reqText");
  const timerEl = document.getElementById("timer");
  const roundPillEl = document.getElementById("roundPill");
  const correctPillEl = document.getElementById("correctPill");
  const diffPillEl = document.getElementById("diffPill");

  const answerSlotsEl = document.getElementById("answerSlots");
  const deckSlotsEl = document.getElementById("deckSlots");
  const submitBtn = document.getElementById("submitBtn");

  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalTitle = document.getElementById("modalTitle");
  const modalBody = document.getElementById("modalBody");
  const modalActions = document.getElementById("modalActions");
  const modalClose = document.getElementById("modalClose");

  const countdownOverlay = document.getElementById("countdownOverlay");

  function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
  function applyAutoScale(){
    document.documentElement.style.setProperty("--ui-scale","1");
    requestAnimationFrame(()=>{
      const doc=document.documentElement;
      const body=document.body;
      const viewportH=window.innerHeight||doc.clientHeight;
      const contentH=Math.max(body.scrollHeight,doc.scrollHeight);
      if(contentH<=viewportH+1){
        document.documentElement.style.setProperty("--ui-scale","1");
        return;
      }
      const ratio=viewportH/contentH;
      const scale=clamp(ratio*0.99,0.75,1);
      document.documentElement.style.setProperty("--ui-scale",String(scale));
    });
  }
  window.addEventListener("resize",applyAutoScale);
  window.addEventListener("orientationchange",applyAutoScale);
  function nudgeScaleSoon(){requestAnimationFrame(applyAutoScale); setTimeout(applyAutoScale,50);}
  applyAutoScale();

  const pad2 = n => String(n).padStart(2,"0");
  function nowLocalString(){
    const d=new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function showToast(msg,ms=900){
    toastEl.textContent=msg;
    toastEl.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>toastEl.classList.remove("show"),ms);
  }
  function openModal({title,bodyHTML,actions=[],showClose=false,lock=false}){
    modalLocked=!!lock;
    modalTitle.textContent=title;
    modalBody.innerHTML=bodyHTML;
    modalActions.innerHTML="";
    modalClose.style.display=showClose?"inline-block":"none";

    for(const a of actions){
      const btn=document.createElement("button");
      btn.className="miniBtn"+(a.primary?" primary":"");
      btn.textContent=a.label;
      if(a.disabled){btn.disabled=true;}
      else{btn.addEventListener("click",()=>a.onClick?.());}
      modalActions.appendChild(btn);
    }

    modalBackdrop.classList.add("show");
    modalBackdrop.setAttribute("aria-hidden","false");
    nudgeScaleSoon();
  }
  function forceCloseModal(){
    modalLocked=false;
    timeoutEndState=null;
    modalBackdrop.classList.remove("show");

  function randomUniqueDigits(count=4){
    const pool=[...Array(10)].map((_,i)=>i);
    for(let i=pool.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [pool[i],pool[j]]=[pool[j],pool[i]];
    }
    return pool.slice(0,count);
  }
  function computeAnswer(goal,digits){
    const sorted=[...digits].sort((a,b)=>goal==="max"?b-a:a-b);
    return sorted.join("");
  }
  function computeAnswerDigits(goal,digits){
    return [...digits].sort((a,b)=>goal==="max"?b-a:a-b);
  }
  function secondsText(ms){

    return `${s}秒`;

    const isLast=helpPage===pages.length-1;

    openModal({
      title:p.title,
      bodyHTML:p.body,
      actions:[
        {label:"上一頁",disabled:isFirst,onClick:()=>openHelp(helpPage-1)},
        {label:"下一頁",disabled:isLast,onClick:()=>openHelp(helpPage+1)},
        {label:"關閉",primary:true,onClick:()=>{forceCloseModal();}}
      ],
      showClose:false,
      lock:true

  /* ===== Records ===== */
  const REC_KEY="ppk_records_v2";
  function loadRecords(){
    try{
      const raw=localStorage.getItem(REC_KEY);
      if(!raw) return [];
      const arr=JSON.parse(raw);
      return Array.isArray(arr)?arr:[];
    }catch{return [];}
  }
  function saveRecords(records){
    localStorage.setItem(REC_KEY,JSON.stringify(records));
  }
  function resultLabel(result){
    if(result==="win")return"通關";
    if(result==="timeout")return"超時失敗";
    if(result==="wrong")return"答錯失敗";
    return"—";
  }
  function addRecord(record){
    const records=loadRecords();
    records.unshift(record);
    saveRecords(records.slice(0,50));
  }
  function formatTimesForTable(r){
    const out=[];
    for(let i=0;i<3;i++){
      const idx=i+1;
      if(i<(r.times?.length||0)){
        out.push(`第${idx}回合：${r.times[i]}s`);
        continue;
      }
      if(r.result==="timeout" && r.failRound===idx){
        out.push(`第${idx}回合：超時`);
        continue;
      }
      if(r.result==="wrong" && r.failRound===idx){
        out.push(`第${idx}回合：答錯`);
        continue;
      }
      out.push(`第${idx}回合：—`);
    }
    return out.join("<br/>");
  }
  function buildRecordsTableHTML(){
    const records=loadRecords();
    if(records.length===0){
      return `<div style="color:rgba(55,65,81,.90); font-weight:900;">目前沒有紀錄。</div>`;
    }
    const rows=records.map(r=>{
      const diffName=DIFF[r.diffKey]?.name ?? r.diffKey;
      const tagClass=r.diffKey==="easy"?"easy":(r.diffKey==="mid"?"mid":"hard");
      return `
        <tr>
          <td><span class="tag ${tagClass}">${diffName}</span></td>
          <td><span class="tag">${resultLabel(r.result)}</span></td>
          <td>${formatTimesForTable(r)}</td>
          <td style="color:rgba(75,85,99,.9);">${r.playedAt}</td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th style="width:110px;">難度</th>
            <th style="width:110px;">結果</th>
            <th>每回合用時／狀態</th>
            <th style="width:190px;">時間</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }
  function showRecordsModalStandalone(){

      actions:[
        {label:"清空紀錄",onClick:()=>{saveRecords([]); showToast("已清空紀錄",1100); showRecordsModalStandalone();}},
        {label:"關閉",primary:true,onClick:forceCloseModal}
      ],
      showClose:false,
      lock:false
    });

  /* ==== Drag / Drop ==== */
  function makeSlot(){
    const slot=document.createElement("div");
    slot.className="slot";

    slot.addEventListener("click",()=>{
      if(modalBackdrop.classList.contains("show"))return;
      if(countdownOverlay.classList.contains("show"))return;
      if(!selectedCardEl)return;
      const fromSlot=selectedCardEl.parentElement?.classList.contains("slot")?selectedCardEl.parentElement:null;
      if(!fromSlot)return;
      if(fromSlot===slot){clearTapSelection(); return;}

      swapOrMoveCard(fromSlot,slot,selectedCardEl);
      clearTapSelection();
      updateSubmitVisibility();
    });

    slot.addEventListener("dragover",e=>{e.preventDefault(); slot.classList.add("over");});
    slot.addEventListener("dragleave",()=>slot.classList.remove("over"));
    slot.addEventListener("drop",e=>{
      e.preventDefault();
      slot.classList.remove("over");
      const draggedId=e.dataTransfer.getData("text/plain");
      const draggedCard=document.getElementById(draggedId);
      if(!draggedCard)return;
      const fromSlot=draggedCard.parentElement?.classList.contains("slot")?draggedCard.parentElement:null;
      if(!fromSlot)return;
      if(fromSlot===slot)return;
      swapOrMoveCard(fromSlot,slot,draggedCard);
      updateSubmitVisibility();
    });

    return slot;
  }

  function makeCard(digit,id){
    const card=document.createElement("div");
    card.className="card";
    card.textContent=String(digit);
    card.id=id;
    card.draggable=true;

    card.addEventListener("dragstart",e=>{
      e.dataTransfer.setData("text/plain",card.id);
      e.dataTransfer.effectAllowed="move";
      clearTapSelection();
    });

    card.addEventListener("click",e=>{
      e.stopPropagation();
      if(modalBackdrop.classList.contains("show"))return;
      if(countdownOverlay.classList.contains("show"))return;

      if(selectedCardEl===card){
        clearTapSelection();
        return;
      }
      clearTapSelection();
      selectedCardEl=card;
      card.classList.add("selected");
      [...document.querySelectorAll(".slot")].forEach(s=>s.classList.add("selectedTarget"));
    });

    return card;
  }

  function swapOrMoveCard(fromSlot,toSlot,movingCard){
    const targetCard=toSlot.querySelector(".card");
    if(targetCard){fromSlot.appendChild(targetCard);}
    toSlot.appendChild(movingCard);
  }

  function renderBoard(digits){
    clearTapSelection();
    answerSlotsEl.innerHTML="";
    deckSlotsEl.innerHTML="";

    for(let i=0;i<4;i++){
      answerSlotsEl.appendChild(makeSlot());
      deckSlotsEl.appendChild(makeSlot());
    }
    digits.forEach((d,i)=>{
      const card=makeCard(d,`card_${Date.now()}_${i}`);
      deckSlotsEl.children[i].appendChild(card);
    });

    updateSubmitVisibility();
    nudgeScaleSoon();
  }

  function setSubmitVisible(visible){
    submitBtn.style.visibility=visible?"visible":"hidden";
    submitBtn.style.pointerEvents=visible?"auto":"none";
  }
  function updateSubmitVisibility(){
    const deckHasCard=[...deckSlotsEl.querySelectorAll(".slot")].some(s=>s.querySelector(".card"));
    setSubmitVisible(!deckHasCard);
  }

  /* 讀取作答欄答案，同時記錄「你的答案」的每一位數字 */
  function readAnswerString(){
    const slots=[...answerSlotsEl.querySelectorAll(".slot")];
    const cards=slots.map(s=>s.querySelector(".card"));
    if(cards.some(c=>!c))return null;
    const digits=cards.map(c=>Number(c.textContent));
    gameState.lastAnswerDigits=digits;
    return digits.join("");
  }

  /* ==== Game flow ==== */
  function stopTimer(){
    if(gameState.timerId){
      clearInterval(gameState.timerId);
      gameState.timerId=null;
    }
  }
  function setTopbarText(){
    const goalText=gameState.roundGoal==="max"?"請排出最大的數":"請排出最小的數";
    reqTextEl.textContent=goalText;
    timerEl.textContent=secondsText(gameState.remainingMs);
    roundPillEl.textContent=`第 ${gameState.roundIndex+1} 回合 / 共 3 回合`;
    correctPillEl.textContent=`已答對 ${gameState.perRoundTimes.length} 題`;
    diffPillEl.textContent=`難度：${DIFF[gameState.diffKey]?.name ?? "—"}`;
  }
  function startRoundCountdownTimer(){
    stopTimer();
    gameState.startTs=performance.now();
    gameState.remainingMs=gameState.limitSec*1000;
    setTopbarText();

    gameState.timerId=setInterval(()=>{
      const elapsed=performance.now()-gameState.startTs;
      const left=Math.max(0,gameState.limitSec*1000-elapsed);
      gameState.remainingMs=left;
      timerEl.textContent=secondsText(left);
      if(left<=0){
        stopTimer();
        endGame(false,"timeout","時間到，這一局遊戲結束。");
      }
    },120);
  }
  function setupRound(){
    clearTapSelection();
    gameState.digits=randomUniqueDigits(4);
    gameState.roundGoal=Math.random()<0.5?"max":"min";
    gameState.limitSec=DIFF[gameState.diffKey].limits[gameState.roundIndex];
    gameState.lastAnswerDigits=null;   // 新回合開始，尚未有玩家答案
    renderBoard(gameState.digits);
    gameState.remainingMs=gameState.limitSec*1000;
    setTopbarText();
  }
  function runStartCountdown3s(){
    return new Promise(resolve=>{
      let n=3;
      countdownNumEl.textContent=String(n);
      countdownOverlay.classList.add("show");
      countdownOverlay.setAttribute("aria-hidden","false");
      nudgeScaleSoon();
      const tick=()=>{
        n-=1;
        if(n<=0){
          countdownOverlay.classList.remove("show");
          countdownOverlay.setAttribute("aria-hidden","true");
          nudgeScaleSoon();
          resolve();
          return;
        }
        countdownNumEl.textContent=String(n);
        setTimeout(tick,1000);
      };
      setTimeout(tick,1000);
    });
  }
  async function startGame(){
    skipRecordThisGame=false;
    gameState.inGame=true;
    gameState.roundIndex=0;
    gameState.perRoundTimes=[];
    gameState.lastAnswerDigits=null;
    switchScreen(true);
    timerEl.textContent="—秒";
    reqTextEl.textContent="—";
    setupRound();
    await runStartCountdown3s();
    if(!gameState.inGame)return;
    startRoundCountdownTimer();
  }

  /* 新版：同時顯示「本回合數字牌」、「正確答案」、「你的答案」 */
  function buildResultCardsHTML(goal,digits,playerDigits){
    const baseDigits=digits;
    const correctDigits=computeAnswerDigits(goal,digits);
    const usedHTML=baseDigits.map(d=>`<div class="miniCard">${d}</div>`).join("");
    const correctHTML=correctDigits.map(d=>`<div class="miniCard">${d}</div>`).join("");
    const playerHTML=playerDigits
      ? playerDigits.map(d=>`<div class="miniCard">${d}</div>`).join("")
      : "";

    return `
      <div class="resultBlock">
        <div class="resultLabel">本回合使用的數字牌</div>
        <div class="cardRow">${usedHTML}</div>
      </div>
      <div class="resultBlock">
        <div class="resultLabel">正確答案</div>
        <div class="cardRow">${correctHTML}</div>
      </div>
      ${playerDigits ? `
      <div class="resultBlock">
        <div class="resultLabel">你的答案</div>
        <div class="cardRow">${playerHTML}</div>
      </div>` : ""}
      <div style="height: var(--result-bottom-gap);"></div>
    `;
  }

        {label:"返回結算",primary:true,onClick:showTimeoutEndSummary}
      ],

    });

  function formatTimesForEndModal(result){
    const out=[];
    for(let i=0;i<3;i++){
      const idx=i+1;
      if(i<gameState.perRoundTimes.length){
        out.push(`<div>第${idx}回合：<strong>${gameState.perRoundTimes[i]}s</strong></div>`);
        continue;
      }
      if(result==="timeout" && (gameState.roundIndex+1)===idx){
        out.push(`<div>第${idx}回合：<strong>超時</strong></div>`);
        continue;
      }
      if(result==="wrong" && (gameState.roundIndex+1)===idx){
        out.push(`<div>第${idx}回合：<strong>答錯</strong></div>`);
        continue;
      }
      out.push(`<div>第${idx}回合：<span style="color:rgba(148,163,184,.9);">—</span></div>`);
    }
    return out.join("");
  }

  function endGame(win,endType,reasonText){
    stopTimer();
    clearTapSelection();
    if(!gameState.inGame)return;
    gameState.inGame=false;

    const title=win?"通關成功":"遊戲結束";

    if(!skipRecordThisGame){
      const record={
        diffKey:gameState.diffKey,
        times:[...gameState.perRoundTimes],
        playedAt:nowLocalString(),
        result:win?"win":endType,
        failRound:win?null:(gameState.roundIndex+1)
      };
      addRecord(record);
    }

    const showCards=!win;
    const body=`
      <div>
        ${reasonText?`<div style="margin-bottom:12px;">${reasonText}</div>`:""}
        <div><span style="color:rgba(75,85,99,.95); font-weight:900;">難度：</span><strong>${DIFF[gameState.diffKey].name}</strong></div>
        <div style="margin-top:10px;">
          <span style="color:rgba(75,85,99,.95); font-weight:900;">這局結果：</span>
          <strong>${resultLabel(win?"win":endType)}</strong>
        </div>
        <div style="margin-top:10px;">
          <span style="color:rgba(75,85,99,.95); font-weight:900;">每回合用時：</span>
          <div style="margin-top:8px;">
            ${formatTimesForEndModal(win?"win":endType)}
          </div>
        </div>
        ${showCards
          ? buildResultCardsHTML(gameState.roundGoal,gameState.digits,gameState.lastAnswerDigits)
          : ""}
      </div>
    `;

    if(endType==="timeout"){
      timeoutEndState={title,bodyHTML:body};
      showTimeoutEndSummary();
      return;
    }

    openModal({
      title,
      bodyHTML:body,
      actions:[
        {label:"回到主畫面",primary:true,onClick:()=>{forceCloseModal(); switchScreen(false);}},
        {label:"查看紀錄",onClick:()=>{forceCloseModal(); showRecordsModalStandalone();}}
      ],
      showClose:false,
      lock:false
    });
  }

  function submitAnswer(){
    if(!gameState.inGame)return;
    const ans=readAnswerString();
    if(ans==null){
      showToast("作答欄還沒放滿四張牌");
      return;
    }
    const correct=computeAnswer(gameState.roundGoal,gameState.digits);
    stopTimer();

    const elapsedSec=Math.round((performance.now()-gameState.startTs)/1000);
    gameState.perRoundTimes.push(elapsedSec);

    if(ans===correct){
      if(gameState.roundIndex===2){
        endGame(true,"win","三個回合皆為正確答案。");
      }else{
        showToast("答案正確，進入下一回合",900);
        gameState.roundIndex+=1;
        setupRound();
        startRoundCountdownTimer();
      }
    }else{
      endGame(false,"wrong",`答案不正確。排出的數字為 <strong>${ans}</strong>，正確答案為 <strong>${correct}</strong>。`);
    }
  }

  function leaveGame(){
    skipRecordThisGame=true;
    stopTimer();
    clearTapSelection();
    countdownOverlay.classList.remove("show");
    forceCloseModal();
    gameState.inGame=false;
    switchScreen(false);
  }

       && !modalBackdrop.classList.contains("show")

  setSubmitVisible(false);
  nudgeScaleSoon();

  /* 一打開網頁就自動跳出遊戲說明（從第 1 頁開始） */
  setTimeout(()=>{
    if(!modalBackdrop.classList.contains("show")){
      openHelp(0);
    }
  },120);
})();
</script>
